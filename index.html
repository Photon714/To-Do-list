<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do list</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mainContainer">
        <div class="leftContainer">
            <div class="listTitle">To-Do List</div><hr>
            <div class="show"></div>
        </div>
        <div class="rightContainer">
            <div class="taskAddition">
                <div class="subtitles">Task Addition Panel</div><hr>
                <div class="panel">
                    <input type="text" class="input1" placeholder="Enter the task" required>
                    <input class="inputdate" type="date">
                    <button onclick="takeinput()" class="enterButton">Enter</button>
                </div>
                <div class="subtext">What are we cooking ? ;)</div>
            </div>
            <div class="taskCount">
                <div class="taskdoneHeading">Task Accomplised</div><hr>
                <div class="taskDone"></div>
            </div>
        </div>
    </div>
    <script src="control.js"></script>
</body>
</html>
