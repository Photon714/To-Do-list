<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do list</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mainContainer">
        <div class="leftContainer">
            <div>To Do List</div>
            <div></div>
        </div>
        <div class="rightContainer">
            <div class="taskAddition">
                <div>Task Addition Panel</div>
                <div class="panel">
                    <input type="text" class="input1" placeholder="Enter the data">
                    <input class="inputdate" type="date">
                    <button onclick="takeinput()">Enter</button>
                </div>
            </div>
            <div class="taskCount">
                <div>Task Accomplised</div>
            </div>
        </div>
    </div>
    <script src="control.js"></script>
</body>
</html>
